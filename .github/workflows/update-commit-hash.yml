name: コミットハッシュ埋め込み

on:
  push:
    branches: [master]

jobs:
  update-hash:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: コミットハッシュをHTMLに埋め込む
        run: |
          HASH=$(git rev-parse --short HEAD)
          sed -i "s/\(<span class=\"commit-hash\">\)[^<]*/\1$HASH/" battle_simulator.html

      - name: 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add battle_simulator.html
          git diff --staged --quiet || git commit -m "ci: コミットハッシュを更新 [skip ci]"
          git push
