// addLog: テスト中はログ収集のみ
function addLog(st, cls, msg) {
  if (!st) return;
  if (!st._logs) st._logs = [];
  st._logs.push({ cls, msg });
}

const _results = [];
let _currentSection = '';

function section(name) { _currentSection = name; }

function test(name, fn) {
  try {
    fn();
    _results.push({ pass: true, section: _currentSection, name });
  } catch(e) {
    _results.push({ pass: false, section: _currentSection, name, error: e.message });
  }
}

function assert(cond, msg) {
  if (!cond) throw new Error(msg || 'アサーション失敗');
}
function assertEqual(a, b, msg) {
  if (a !== b) throw new Error((msg || '') + ` → 期待値: ${b}, 実際値: ${a}`);
}
function assertNear(a, b, tol, msg) {
  if (Math.abs(a - b) > tol) throw new Error((msg || '') + ` → 期待値: ${b}±${tol}, 実際値: ${a}`);
}

function makeUnit(opts = {}) {
  return {
    name:         opts.name        || 'テスト武将',
    hp:           opts.hp          || 10000,
    maxHp:        opts.maxHp       || 10000,
    bu:           opts.bu          || 150,
    chi:          opts.chi         || 150,
    to:           opts.to          || 150,
    spd:          opts.spd         || 100,
    critRate:     opts.critRate    || 0,
    critBonus:    opts.critBonus   || 0.5,
    kiryakuRate:  opts.kiryakuRate || 0,
    kiryakuBonus: opts.kiryakuBonus|| 0,
    renegadeRate: opts.renegadeRate|| 0,
    fixed:        opts.fixed       || null,
    slots:        opts.slots       || [],
    ...opts
  };
}

function makeState(allies = [], enemies = []) {
  if (!allies.length) allies = [makeUnit({ name: '味方1' })];
  if (!enemies.length) enemies = [makeUnit({ name: '敵1' })];
  return {
    ally:   allies,
    enemy:  enemies,
    turn:   1,
    log:    [],
    _logs:  [],
    _lastMods: '',
    fuuseki: { ally: [0, 0, 0], enemy: [0, 0, 0] },
    hiyokuSide:  null,
    hiyokuAccum: 0,
  };
}

// dealDmg をラップしてダメージ記録
let _dmgLog = [];
const _origDealDmg = dealDmg;
dealDmg = function(st, target, dmg, attacker, attackerIsSelf, isMelee = false, isChi = false) {
  _dmgLog.push({ target: target.name, raw: dmg, isMelee, isChi });
  return _origDealDmg(st, target, dmg, attacker, attackerIsSelf, isMelee, isChi);
};

// Math.random を固定値で差し替え（テスト用：常に発動させる）
let _fixedRandom = null;
const _origRandom = Math.random;
Math.random = function() {
  return _fixedRandom !== null ? _fixedRandom : _origRandom();
};

function withRandom(val, fn) {
  _fixedRandom = val;
  try { fn(); } finally { _fixedRandom = null; }
}

function resetDmgLog() { _dmgLog = []; }

// 期待ダメージ計算（検証用）
function expectedDmg(base, rate) {
  // applyRate の中央値: base * rate/100 * 1.0（ランダム中央）
  return Math.round(base * (rate / 100));
}

// 水攻め：戦法ごとに異なる継続ダメ率を持つが、
// turn.js は suikouRate フィールドを参照せず一律 102% を使用している。
// 各戦法で期待される rate と実装の設定値を比較する。

test('水計 — 水攻め付与時に suikouRate が設定されていること (仕様: 70%/T)', () => {
  const me = makeUnit({ name: '付与者', chi: 150 });
  const tgt = makeUnit({ name: '被付与者', chi: 150 });
  const st = makeState([me], [tgt]);
  const sk = SENPO_DB['水計'];

  // 水計は発動率35%のため、Math.randomを0（必ず発動）に設定
  withRandom(0, () => {
    execSlot(st, sk, me, true, 1.0);
  });

  // suikouT が設定されているはずなので確認
  assert((tgt.suikouT || 0) > 0, '水計: suikouT が付与されていない');

  // 仕様: 水計は70%/T。実装にsuikouRateが設定されているか確認。
  // ない場合はturn.jsが102%を使うのでバグ扱い。
  const rate = tgt.suikouRate;
  // NOTE: 現在の実装では suikouRate を保存していないため undefined
  if (rate === undefined || rate === null) {
    throw new Error(
      '水計の水攻めに suikouRate が設定されていない。' +
      'turn.js は一律102%を使用するため、仕様の70%/Tと不一致。'
    );
  }
  assertEqual(rate, 70, '水計 suikouRate');
});

section('伝授戦法ダメージ率チェック');

// 共通: ダメージ率の期待範囲を確認
// Math.random=0.5 (中央値) で呼び出し, applyRateの乱数範囲0.956-1.044
// 期待ダメージ = base * rate/100 * [0.956, 1.044]
function checkDmgRate(senpoName, targetIdx, expectedRate, isMelee, opts = {}) {
  const me  = makeUnit({ name: '攻撃者', bu: opts.bu||150, chi: opts.chi||150, to: opts.to||150 });
  const tgt = makeUnit({ name: '標的', bu: 150, chi: 150, to: 150 });
  const st  = makeState([me], [tgt]);
  if (opts.prepName) me.prepName = opts.prepName;
  const sk  = SENPO_DB[senpoName];
  assert(sk != null, `SENPO_DBに「${senpoName}」が存在しない`);

  resetDmgLog();
  withRandom(0, () => { execSlot(st, sk, me, true, 1.0); });

  // ダメージが記録されているか
  assert(_dmgLog.length > 0, `${senpoName}: ダメージが記録されなかった`);

  const hit = _dmgLog[targetIdx || 0];
  if (!hit) throw new Error(`${senpoName}: インデックス ${targetIdx||0} のダメージが存在しない`);

  // 期待ダメージの計算（Math.random=0の場合: 0.956 * base * rate/100）
  const base = baseDmg(isMelee ? me.bu : me.chi, isMelee ? tgt.to : tgt.chi, me.hp);
  const expectedMin = Math.round(base * expectedRate / 100 * 0.956) * 0.9;
  const expectedMax = Math.round(base * expectedRate / 100 * 1.044) * 1.1;

  assert(
    hit.raw >= expectedMin && hit.raw <= expectedMax,

// カテゴリ 6: 発動確率の統計的検証
// 1000回試行して発動率が仕様の±5%以内であることを確認
// ════════════════════════════════════════════
section('発動確率 統計テスト (n=1000, 許容±5%)');

function probTest(senpoName, expectedProb, isPrepped = false) {
  test(`${senpoName} 発動確率 (仕様: ${Math.round(expectedProb*100)}%)`, () => {
    const N = 1000;
    let fired = 0;
    _fixedRandom = null; // 本物のランダムを使う
    for (let i = 0; i < N; i++) {
      const me  = makeUnit({ name: '攻撃者' });
      const tgt = makeUnit({ name: '標的', to: 150 });
      const st  = makeState([me], [tgt]);
      const sk  = SENPO_DB[senpoName];
      if (!sk) throw new Error(`SENPO_DBに「${senpoName}」が存在しない`);
      if (isPrepped) me.prepName = senpoName;
      resetDmgLog();
      const logsBefore = st._logs ? st._logs.length : 0;

      // 確率発動チェックのみ（実際の効果は問わない）
      const skCopy = { ...sk, prob: expectedProb };
      execSlot(st, skCopy, me, true, 1.0);

      // 発動判定: ログにこの戦法の発動記録があるか
      const sl = st._logs || [];
      const hasFired = sl.some(l => l.msg && l.msg.includes(senpoName));
      if (hasFired) fired++;
    }
    const actualRate = fired / N;
    const tolerance  = 0.05;
    assert(
      Math.abs(actualRate - expectedProb) <= tolerance,
      `${senpoName}: 実測発動率 ${(actualRate*100).toFixed(1)}% が仕様 ${Math.round(expectedProb*100)}%±5% 外`
    );
  });
}

// 発動確率が分かりやすい代表的な戦法を確認
// 注: 確率テストはランダム性があるため偶発的失敗の可能性あり
probTest('霹靂一撃', 0.35);
probTest('乗勝追撃', 0.30);
probTest('理非曲直', 0.35);
probTest('帰還の凱歌', 0.45);
probTest('水攻干計', 0.30, true);
probTest('奇策縦横', 0.30, true);

// 結果出力
// ════════════════════════════════════════════

function renderResults() {
  const out = document.getElementById('output');
  const pass = _results.filter(r => r.pass).length;
  const fail = _results.filter(r => !r.pass).length;
  const pct  = Math.round(pass / _results.length * 100);

  let html = `<div class="summary">
    <span class="pass">✓ ${pass} passed</span> &nbsp;
    <span class="${fail > 0 ? 'fail' : 'pass'}">${fail > 0 ? '✗' : '✓'} ${fail} failed</span> &nbsp;
    (合計 ${_results.length} テスト, ${pct}%)
  </div>`;

  // セクションごとにグループ化
  const sections = [...new Set(_results.map(r => r.section))];
  for (const sec of sections) {
    const rows = _results.filter(r => r.section === sec);
    const sf = rows.filter(r => !r.pass).length;
    html += `<h2>${sec} — ${sf === 0 ? '<span class="pass">全通過</span>' : `<span class="fail">${sf}件失敗</span>`}</h2>`;
    html += '<div class="section">';
    for (const r of rows) {
      const icon = r.pass ? '<span class="pass">✓</span>' : '<span class="fail">✗</span>';
      html += `<div class="test-row ${r.pass ? '' : 'fail-row'}">${icon} ${r.name}`;
      if (!r.pass) html += `<pre>${r.error}</pre>`;
      html += '</div>';
    }
    html += '</div>';
  }

  out.innerHTML = html;
}

renderResults();
